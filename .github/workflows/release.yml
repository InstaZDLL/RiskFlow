name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex. 1.0.0)"
        required: false
        default: "1.0.0"

permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        shell: pwsh
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          $v = $env:INPUT_VERSION
          if ($env:REF_TYPE -eq "tag") { $v = $env:REF_NAME.TrimStart("v") }
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "1.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - name: Publish (self-contained, win-x64)
        run: dotnet publish src/RiskFlow.App/RiskFlow.csproj -c Release -r win-x64 -p:Platform=x64 -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Sign application (optional)
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_BASE64)) {
            Write-Host "Aucun certificat (secret PFX_BASE64 absent) — signature ignorée."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f $pfx /p $env:PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "publish\RiskFlow.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer\RiskFlow.iss'

      - name: Sign installer (optional)
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_BASE64)) { exit 0 }
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f $pfx /p $env:PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "installer-output\RiskFlow-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: RiskFlow-Setup
          path: installer-output/RiskFlow-Setup.exe

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: installer-output/RiskFlow-Setup.exe
          generate_release_notes: true
